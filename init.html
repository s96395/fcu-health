  ],
};

const log = document.getElementById("log");
const btn = document.getElementById("btn");

function addLog(msg) {
  log.textContent += msg + "\n";
  log.scrollTop = log.scrollHeight;
}

window.run = async () => {
  btn.disabled = true;
  log.textContent = "";
  let count = 0;
  try {
    // 先刪除所有舊資料
    addLog("🗑 清除舊資料中...");
    const snap = await getDocs(collection(db, "slots"));
    for (const d of snap.docs) {
      await deleteDoc(d.ref);
      addLog(`  刪除 ${d.id}`);
    }
    addLog(`✓ 已清除 ${snap.docs.length} 筆舊資料\n`);

    // 寫入新資料
    addLog("📝 寫入新資料...");
    for (const [date, slots] of Object.entries(SLOTS_DATA)) {
      for (const slot of slots) {
        const id = `${date}_${slot.time.replace(":", "")}`;
        await setDoc(doc(db, "slots", id), {
          date,
          time: slot.time,
          limit: slot.limit,
          scope: slot.scope || null,
          booked: 0
        });
        count++;
        addLog(`✓ ${date} ${slot.time}（上限 ${slot.limit} 位）`);
      }
    }
    addLog(`\n✅ 完成！共寫入 ${count} 個時段`);
    addLog("可以關閉此頁面了。");
  } catch (err) {
    addLog("❌ 錯誤：" + err.message);
    btn.disabled = false;
  }
};
